<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Devin! 🎉</title>
    <!-- Link to external CSS file -->
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:,">

</head>
<body>

    <!-- Background Music Player (Hidden) -->
    <!-- FIX: Replaced main website domain with a direct public MP3 audio link -->
    

    <audio id="birthday-track" loop>
        <source src="devin.mp3" type="audio/mpeg">
    </audio>

    <!-- Confetti layer -->
    <div id="confetti-wrapper"></div>

    <!-- Full screen game container grid -->
    <div id="game-container">
        
        <!-- Header details overlays the game area -->
        <div class="content-overlay">
            <div class="cake-emoji">🎂</div>
            <div id="animated-heading" class="birthday-title"></div> 
                
            <!-- Birthday Child Image Container -->
            <!-- FIX: Cleaned file path extension from .png.png to .png -->
            <div class="photo-container">
                <img src="img/devin.jpg" alt="Devin" class="birthday-photo">
            </div>

        </div>

    </div>

    <!-- Link to external JavaScript file -->
    <script src="script.js"></script>
</body>
</html>
